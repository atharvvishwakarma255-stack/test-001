openapi: 3.0.3
info:
  title: test-001 API
  version: 1.0.0
paths:
  /test:
    get:
      operationId: testRoute
      summary: Test route
      responses:
        '200':
          description: OK
          content:
            application/json:
              example: { success: true, server: "Server 1", message: "Test route is working" }
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              example: { status: ok }
  /users:
    get:
      operationId: listUsers
      summary: List users
      responses:
        '200':
          description: OK
          content:
            application/json:
              example: { users: [] }
  /users/{id}:
    get:
      operationId: getUser
      summary: Get a user by ID
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              example: { id: "1", name: "Aniket" }
        '404':
          description: Not found
